<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7F77DD;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#5A32C9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4A1F9F;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="darkSide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3C1A7F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2D1B4E;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Shield icon only for compact header use -->
  <g transform="translate(100, 70)">
    <!-- Left darker side -->
    <path d="M -30,-40 L 0,-55 L 0,0 L -30,10 Z" fill="url(#darkSide)"/>

    <!-- Right brighter side -->
    <path d="M 0,-55 L 30,-40 L 30,10 L 0,0 Z" fill="url(#shieldGradient)"/>

    <!-- Bottom curved part -->
    <path d="M -30,10 L 0,0 L 30,10 Q 30,25 0,37.5 Q -30,25 -30,10 Z" fill="url(#shieldGradient)" opacity="0.95"/>

    <!-- Central divider line -->
    <line x1="0" y1="-55" x2="0" y2="37.5" stroke="#FFFFFF" stroke-width="1.5" opacity="0.9"/>

    <!-- Decorative dots -->
    <circle cx="-12" cy="-25" r="1.2" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="12" cy="-25" r="1.2" fill="#FFFFFF" opacity="0.6"/>

    <!-- Calligraphic letters -->
    <text x="-10" y="4" text-anchor="middle" style="font-family: Georgia, serif; font-size: 28px; font-weight: 700; fill: white;">R</text>
    <text x="12" y="4" text-anchor="middle" style="font-family: Georgia, serif; font-size: 28px; font-weight: 700; fill: white;">W</text>
  </g>
</svg>
